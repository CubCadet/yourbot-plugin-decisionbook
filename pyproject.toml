[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["core", "decisionbook"]

[tool.coverage.report]
fail_under = 90
show_missing = true
skip_covered = false

[tool.basedpyright]
include = ["__main__.py", "core.py", "decisionbook.py", "tools", "tests"]
pythonVersion = "3.12"
typeCheckingMode = "standard"
