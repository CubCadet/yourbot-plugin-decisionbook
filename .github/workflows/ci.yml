name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-checks:
    name: Release checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install runtime and audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip check

      - name: Lint
        run: ruff check .

      - name: Runtime type check
        run: basedpyright

      - name: Security scan
        run: bandit -q -r core.py decisionbook.py __main__.py tools -ll

      - name: Runtime dependency vulnerability audit
        run: pip-audit --strict -r requirements.txt

      - name: Development dependency vulnerability audit
        run: pip-audit --strict -r requirements-dev.txt

      - name: Tests and branch coverage
        run: >-
          python -m pytest tests -q -p no:cacheprovider
          --cov=core --cov=decisionbook --cov-branch
          --cov-report=term-missing
          --cov-fail-under=90

      - name: Verify release tag matches manifest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          version = json.loads(Path("manifest.json").read_text(encoding="utf-8"))["version"]
          expected = f"v{version}"
          actual = os.environ["GITHUB_REF_NAME"]
          if actual != expected:
              raise SystemExit(f"release tag {actual!r} must equal {expected!r}")
          PY

      - name: YourBot SDK validation
        run: |
          yourbot validate --path .
          yourbot doctor --path .

      - name: Fail-closed release audit
        run: python tools/run_audit.py

      - name: Upload validated marketplace bundle
        if: >-
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: decisionbook-marketplace-bundle
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
