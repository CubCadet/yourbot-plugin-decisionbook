name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime and audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip check

      - name: Lint
        run: ruff check .

      - name: Runtime type check
        run: basedpyright

      - name: Security scan
        run: bandit -q -r core.py decisionbook.py __main__.py tools -ll

      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.txt

      - name: Tests and branch coverage
        run: >-
          python -m pytest tests -q -p no:cacheprovider
          --cov=core --cov=decisionbook --cov-branch
          --cov-report=term-missing --cov-report=xml
          --cov-fail-under=90

      - name: YourBot SDK validation
        run: |
          yourbot validate --path .
          yourbot doctor --path .

      - name: Fail-closed release audit
        run: python tools/run_audit.py

      - name: Upload validated marketplace bundle
        uses: actions/upload-artifact@v7
        with:
          name: decisionbook-marketplace-bundle
          path: dist/*.zip
          if-no-files-found: error
