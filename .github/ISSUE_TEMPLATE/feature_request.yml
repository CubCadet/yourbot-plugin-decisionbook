name: Feature request
description: Suggest a focused improvement to DecisionBook.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Explain the user problem first. Do not include private Discord decision content or server data.
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What is difficult today, and who is affected?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the experience you want, without requiring a specific implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
