name: Bug report
description: Report a reproducible DecisionBook problem without sharing private server data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve DecisionBook. Do not include decision text, Discord tokens,
        private server details, or security vulnerabilities in this public form.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This report contains no private Discord data or credentials.
          required: true
        - label: This is not a security vulnerability.
          required: true
  - type: input
    id: version
    attributes:
      label: DecisionBook version
      description: Find this in the installed plugin details, for example 0.3.1.
      placeholder: 0.3.1
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - Discord command
        - Discord modal
        - Discord button
        - YourBot dashboard
        - Installation or update
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use placeholder text instead of real decision content or server names.
      placeholder: |
        1. Run /decision ...
        2. Enter placeholder text ...
        3. Select ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional non-sensitive context
      description: Include sanitized screenshots or error text only if they reveal no private data.
